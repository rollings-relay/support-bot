version: "3"

services:

  bot:
    build:
      context: .
    container_name: support-bot
    command: sh -c "cd /usr/src/app && python -m app"
    restart: always
    depends_on:
      - redis
    volumes:
      - .:/usr/src/app
    networks:
      - network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:alpine
    container_name: support-redis
    restart: always
    command: sh -c "chown -R redis:redis /data && exec /bin/setpriv --reuid redis --regid redis --clear-groups /usr/local/bin/redis-server"
    volumes:
      - ./redis/data/:/data
    networks:
      - network


networks:
  network:
